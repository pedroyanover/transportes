# VERSION DE DOCKER COMPOSE
version: '3.8'

# CREA RED VIRTUAL INTERNA. LOS SERVICIOS SE COMUNICAN
# USANDO DNS INTERNO.

# Aislamiento: Los servicios solo son accesibles entre ellos y mediante puertos expuestos
networks:
  backend-net:
    driver: bridge

services:
  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - backend-net
    environment:
      SPRING_APPLICATION_NAME: eureka-server
      EUREKA_SERVER_PORT: 8761
      EUREKA_INSTANCE_HOSTNAME: eureka-server

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata # UBICACION DONDE SE GUARDAN LOS DATOS.
      TZ: America/Argentina/Buenos_Aires
      PGTZ: America/Argentina/Buenos_Aires
    volumes:
      - ./pgdata:/var/lib/postgresql/data/pgdata
      # SOLO datos de prueba iniciales (opcional)
      # - ./db/scripts/data.sql:/docker-entrypoint-initdb.d/20-data.sql
    ports:
      - "5432:5432"
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  pgadmin: # INTERFAZ PARA ADMIN DE LA BD.
    image: dpage/pgadmin4
    container_name: pgadmin
    user: root
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  keycloak: # Autenticación y Autorización
    image: quay.io/keycloak/keycloak:23.0.7
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 9090
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8080
      KC_PROXY: edge
    command: start-dev --import-realm
    volumes:
      - ./config/keycloak/tpi-realm-realm.json:/opt/keycloak/data/import/tpi-realm-realm.json
    ports:
      - "9090:8080"
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_APPLICATION_NAME: API-GATEWAY
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER-URI: http://keycloak:8080/realms/tpi-realm
    networks:
      - backend-net
    depends_on:
      eureka-server:
        condition: service_started
      keycloak:
        condition: service_started

  ms-solicitudes:
    build:
      context: ./ms-solicitudes
      dockerfile: Dockerfile
    container_name: ms-solicitudes
    ports:
      - "8091:8091"
    environment:
      SPRING_APPLICATION_NAME: MS-SOLICITUDES
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      # Flyway / Hibernate settings
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_FLYWAY_ENABLED: 'true'
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration/ms_solicitudes
      SPRING_FLYWAY_SCHEMAS: ms_solicitudes
      SPRING_FLYWAY_CREATE_SCHEMAS: 'true'
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started

  ms-logistica:
    build:
      context: ./ms-logistica
      dockerfile: Dockerfile
    container_name: ms-logistica
    ports:
      - "8092:8092"
    environment:
      SPRING_APPLICATION_NAME: MS-LOGISTICA
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      # Flyway / Hibernate settings
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_FLYWAY_ENABLED: 'true'
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration/ms_logistica
      SPRING_FLYWAY_SCHEMAS: ms_logistica
      SPRING_FLYWAY_CREATE_SCHEMAS: 'true'
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started

  ms-facturacion:
    build:
      context: ./ms-facturacion
      dockerfile: Dockerfile
    container_name: ms-facturacion
    ports:
      - "8093:8093"
    environment:
      SPRING_APPLICATION_NAME: MS-FACTURACION
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      # Flyway / Hibernate settings
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_FLYWAY_ENABLED: 'true'
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration/ms_facturacion
      SPRING_FLYWAY_SCHEMAS: ms_facturacion
      SPRING_FLYWAY_CREATE_SCHEMAS: 'true'
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started

  ms-tracking:
    build:
      context: ./ms-tracking
      dockerfile: Dockerfile
    container_name: ms-tracking
    ports:
      - "8094:8094"
    environment:
      SPRING_APPLICATION_NAME: MS-TRACKING
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      # Flyway / Hibernate settings
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_FLYWAY_ENABLED: 'true'
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration/ms_tracking
      SPRING_FLYWAY_SCHEMAS: ms_tracking
      SPRING_FLYWAY_CREATE_SCHEMAS: 'true'
    networks:
      - backend-net
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_started

volumes:
  pgadmin-data: