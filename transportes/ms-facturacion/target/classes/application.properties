# =========================
# 🎯 APPLICATION CONFIGURATION
# =========================
spring.application.name=ms-facturacion
server.port=8093

# =========================
# 💾 DATABASE CONFIGURATION
# =========================
spring.datasource.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:transportes}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# 🗄️ JPA/HIBERNATE
# =========================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# ✅ CAMBIADO: validate en lugar de create
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Deshabilitar inicialización diferida de datos
spring.jpa.defer-datasource-initialization=false

# =========================
# 📦 SQL INITIALIZATION
# =========================
# ❌ DESHABILITADO: Lo maneja Hibernate con validate o Flyway
spring.sql.init.mode=never
spring.sql.init.platform=postgres

# =========================
# 🔍 EUREKA CLIENT
# =========================
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true

# =========================
# 📝 LOGGING
# =========================
logging.level.com.tpi.facturacion=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =========================
# 🚀 FLYWAY
# =========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/ms_facturacion
spring.flyway.schemas=ms_facturacion
spring.flyway.create-schemas=true