# =========================
# ðŸŽ¯ APPLICATION CONFIGURATION
# =========================
spring.application.name=ms-facturacion
server.port=8093

# =========================
# ðŸ’¾ DATABASE CONFIGURATION
# =========================
spring.datasource.url=jdbc:postgresql://postgres:5432/${POSTGRES_DB:transportes}
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# ðŸ—„ï¸ JPA/HIBERNATE
# =========================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# âœ… CAMBIADO: validate en lugar de create
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
# Deshabilitar inicializaciÃ³n diferida de datos
spring.jpa.defer-datasource-initialization=false

# =========================
# ðŸ“¦ SQL INITIALIZATION
# =========================
# âŒ DESHABILITADO: Lo maneja Hibernate con validate o Flyway
spring.sql.init.mode=never
spring.sql.init.platform=postgres

# =========================
# ðŸ” EUREKA CLIENT
# =========================
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true

# =========================
# ðŸ“ LOGGING
# =========================
logging.level.com.tpi.facturacion=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# =========================
# ðŸš€ FLYWAY
# =========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/ms_facturacion
spring.flyway.schemas=ms_facturacion
spring.flyway.create-schemas=true\r\n# =========================
# ðŸ“š SWAGGER/OPENAPI
# =========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

