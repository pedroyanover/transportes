# =========================
# ðŸŽ¯ APPLICATION CONFIGURATION
# =========================
spring.application.name=MS-SOLICITUDES
server.port=8091

# =========================
# ðŸ’¾ DATABASE CONFIGURATION
# =========================
spring.datasource.url=jdbc:postgresql://postgres:5432/tpi_db
spring.datasource.username=${POSTGRES_USER:user}
spring.datasource.password=${POSTGRES_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# ðŸ—„ï¸ JPA/HIBERNATE
# =========================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# âœ… CAMBIADO: validate en lugar de create
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=false

# =========================
# ðŸ“¦ SQL INITIALIZATION
# =========================
spring.sql.init.mode=never
spring.sql.init.platform=postgresql

# =========================
# ðŸ” EUREKA CLIENT
# =========================
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.hostname=ms-solicitudes

# =========================
# ðŸ“ LOGGING
# =========================
logging.level.com.tpi=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# =========================
# ðŸ“š SWAGGER/OPENAPI
# =========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# ðŸš€ FLYWAY (estÃ¡ndar: permite override por env vars)
# =========================
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=${SPRING_FLYWAY_LOCATIONS:classpath:db/migration/ms_solicitudes}
spring.flyway.schemas=${SPRING_FLYWAY_SCHEMAS:ms_solicitudes}
spring.flyway.create-schemas=${SPRING_FLYWAY_CREATE_SCHEMAS:true}

