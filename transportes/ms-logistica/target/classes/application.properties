# =========================
# 🎯 APPLICATION CONFIGURATION
# =========================
spring.application.name=ms-logistica
server.port=8092

# =========================
# 💾 DATABASE CONFIGURATION
# =========================
spring.datasource.url=jdbc:postgresql://postgres:5432/tpi_db
spring.datasource.username=${POSTGRES_USER:user}
spring.datasource.password=${POSTGRES_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# 🗄️ JPA/HIBERNATE
# =========================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# ✅ CAMBIADO: validate en lugar de create
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=false

# =========================
# 📦 SQL INITIALIZATION
# =========================
spring.sql.init.mode=never
spring.sql.init.platform=postgresql

# =========================
# 🔍 EUREKA CLIENT
# =========================
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.instance.prefer-ip-address=true

# =========================
# 📝 LOGGING
# =========================
logging.level.com.tpi.logistica=INFO
logging.level.org.hibernate.SQL=DEBUG

# =========================
# 🗺️ GOOGLE MAPS API
# =========================
# Allow empty default so missing env var doesn't break startup
google.maps.api.key=${GOOGLE_MAPS_API_KEY:}