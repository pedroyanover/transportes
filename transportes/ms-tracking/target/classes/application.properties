# =========================
# ðŸŽ¯ APPLICATION CONFIGURATION
# =========================
spring.application.name=MS-TRACKING
server.port=8094

# =========================
# ðŸ’¾ DATABASE CONFIGURATION
# =========================
spring.datasource.url=jdbc:postgresql://postgres:5432/tpi_db
spring.datasource.username=${POSTGRES_USER:user}
spring.datasource.password=${POSTGRES_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# ðŸ—„ï¸ JPA/HIBERNATE
# =========================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# âœ… CAMBIADO: validate en lugar de create
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=false

# =========================
# ðŸ“¦ SQL INITIALIZATION
# =========================
# âŒ DESHABILITADO: Ahora usamos validate
spring.sql.init.mode=never
spring.sql.init.continue-on-error=false

# =========================
# ðŸ” EUREKA CLIENT
# =========================
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# =========================
# ðŸ“š SPRINGDOC OPENAPI
# =========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# =========================
# ðŸ“ LOGGING
# =========================
logging.level.com.tpi.tracking=INFO
logging.level.org.hibernate.SQL=DEBUG\r\n# =========================
# ðŸš€ FLYWAY (estÃ¡ndar: permite override por env vars)
# =========================
spring.flyway.enabled=${SPRING_FLYWAY_ENABLED:true}
spring.flyway.locations=${SPRING_FLYWAY_LOCATIONS:classpath:db/migration/ms_tracking}
spring.flyway.schemas=${SPRING_FLYWAY_SCHEMAS:ms_tracking}
spring.flyway.create-schemas=${SPRING_FLYWAY_CREATE_SCHEMAS:true}

