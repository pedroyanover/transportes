# =========================
# 🎯 APPLICATION CONFIGURATION
# =========================
spring.application.name=MS-TRACKING
server.port=8094

# =========================
# 💾 DATABASE CONFIGURATION
# =========================
spring.datasource.url=jdbc:postgresql://postgres:5432/tpi_db
spring.datasource.username=${POSTGRES_USER:user}
spring.datasource.password=${POSTGRES_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# =========================
# 🗄️ JPA/HIBERNATE
# =========================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# ✅ CAMBIADO: validate en lugar de create
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=false

# =========================
# 📦 SQL INITIALIZATION
# =========================
# ❌ DESHABILITADO: Ahora usamos validate
spring.sql.init.mode=never
spring.sql.init.continue-on-error=false

# =========================
# 🔍 EUREKA CLIENT
# =========================
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# =========================
# 📚 SPRINGDOC OPENAPI
# =========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# =========================
# 📝 LOGGING
# =========================
logging.level.com.tpi.tracking=INFO
logging.level.org.hibernate.SQL=DEBUG